<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Spirit Grid - Interactive Quiz</title>
    <style>
        /* මුළු පිටුවම screen එකට fit කලා */
        body {
            margin: 0;
            background: #000c24;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Slide container එක responsive කලා */
        .slide-container {
            width: 95%;
            max-width: 1280px;
            min-height: 90vh;
            background: radial-gradient(circle, #001a3d 0%, #000c24 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        h2 {
            color: #00f2ff;
            font-size: clamp(24px, 4vw, 42px);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            text-align: center;
        }

        /* Grid එක screen size එක අනුව auto හැඩගැසෙනවා */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            perspective: 1000px;
            width: 100%;
            max-width: 1000px;
        }

        /* Tiles වල size auto හැදෙනවා */
        .tile {
            aspect-ratio: 180 / 110;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile.flipped {
            transform: rotateY(180deg);
        }

        .tile-front,
        .tile-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: clamp(14px, 2.5vw, 24px);
            border: 2px solid #00f2ff;
            box-sizing: border-box;
        }

        .tile-front {
            background: linear-gradient(135deg, #002855 0%, #001233 100%);
            color: #00f2ff;
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .tile-front:hover {
            background: #003a7a;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }

        .tile-back {
            background: #00f2ff;
            color: #000c24;
            transform: rotateY(180deg);
            box-shadow: 0 0 30px #00f2ff;
            font-size: clamp(11px, 2vw, 18px);
            text-align: center;
            padding: 5px;
            letter-spacing: 0.5px;
            word-break: break-word;
        }

        .footer {
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="slide-container">
        <h2>The Spirit Grid</h2>

        <div class="grid-container" id="grid"></div>

        <div class="footer">INTERACTIVE QUIZ</div>
    </div>

    <script>
        const rewards = [
            "Oshadi", "Senesha", "Minoli", "Bihandu", "Warsha",
            "Saumya", "Hesadi", "Minoshi", "Nethum", "Ishadi",
            "Dilakna", "Dahami", "Nishmi", "Nethushi", "Dulmi",
            "Madhushika", "Monica", "Shan", "Linura", "Bonus Blessing 🌟"
        ];

        const grid = document.getElementById('grid');

        for (let i = 0; i < 20; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerHTML = `
            <div class="tile-front">CLICK!</div>
            <div class="tile-back">${rewards[i]}</div>
        `;
            tile.onclick = function () {
                this.classList.toggle('flipped');
            };
            grid.appendChild(tile);
        }
    </script>

</body>

</html>
